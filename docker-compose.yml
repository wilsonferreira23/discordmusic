services:
  bot:
    build: .
    environment:
      DISCORD_TOKEN:
      SPOTIFY_CLIENT_ID:
      SPOTIFY_CLIENT_SECRET:
      POT_PROVIDER_URL: http://pot-provider:4416
    depends_on:
      pot-provider:
        condition: service_started
    restart: unless-stopped

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno
    restart: unless-stopped
